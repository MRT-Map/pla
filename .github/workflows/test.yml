name: Test
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          envs: "test"
      - run: cargo llvm-cov --all-features --all-targets --text --color=always -- --nocapture
