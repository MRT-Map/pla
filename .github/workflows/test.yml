name: Test
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          envs: "test"
      - run: cargo llvm-cov --all-features --all-targets --text --color=always -- --nocapture
